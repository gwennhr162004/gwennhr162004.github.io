<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For My Bebdu 💙</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:Poppins,sans-serif;
  background:linear-gradient(180deg,#4da3ff,#9ed0ff);
  overflow:hidden;
  color:#fff;
}

/* SLIDES */
.slide{
  display:none;
  height:100vh;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}
.active{display:flex}

/* CARD */
.card{
  background:#ffffffdd;
  color:#2a63b8;
  border-radius:25px;
  padding:30px;
  text-align:center;
  box-shadow:0 20px 40px rgba(0,0,0,.2);
}

/* BUTTON */
.btn{
  border:none;
  padding:14px 22px;
  border-radius:50px;
  margin-top:10px;
  background:#4d95ff;
  color:#fff;
  font-weight:700;
  cursor:pointer;
}

/* 🎂 CAKE */
.candles{
  display:flex;
  gap:12px;
  margin-bottom:20px;
}

/* candle */
.candle{
  width:12px;
  height:40px;
  background:#ffb6c1;
  border-radius:5px;
  position:relative;
}

/* 🔥 flame realistic */
.flame{
  position:absolute;
  top:-20px;
  left:0;
  width:12px;
  height:20px;
  border-radius:50%;
  background:radial-gradient(circle,#fff 10%,#ff0 40%,#ff8c00 80%);
  filter:blur(1px);
  animation:flicker 0.15s infinite alternate;
}

/* glow */
.flame::after{
  content:"";
  position:absolute;
  width:18px;
  height:18px;
  top:-2px;
  left:-3px;
  background:rgba(255,200,0,0.3);
  border-radius:50%;
  filter:blur(6px);
}

/* flicker */
@keyframes flicker{
  0%{transform:scale(1) rotate(0deg);}
  100%{transform:scale(1.2) rotate(4deg);}
}

/* 💨 smoke */
.smoke{
  width:8px;
  height:8px;
  background:gray;
  border-radius:50%;
  position:absolute;
  top:-20px;
  opacity:0;
  animation:smoke 1s forwards;
}

@keyframes smoke{
  0%{opacity:0.8; transform:translateY(0);}
  100%{opacity:0; transform:translateY(-30px);}
}

/* TEXT */
.msg{
  font-size:26px;
  margin-top:15px;
  font-weight:700;
}

/* 🎁 GIFT GRID */
.gifts{
  display:flex;
  gap:20px;
}

.gift{
  width:110px;
  height:110px;
  background:#ffffffcc;
  border-radius:20px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  font-size:40px;
  color:#2a63b8;
  cursor:pointer;
  transition:0.3s;
}

.gift:hover{
  transform:scale(1.15);
}

/* MODALS */
.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  justify-content:center;
  align-items:center;
}

.box{
  background:#fff;
  color:#000;
  padding:20px;
  border-radius:20px;
  max-width:400px;
  text-align:center;
}

/* PHOTO GRID */
.photos img{
  width:100%;
  border-radius:10px;
  margin-top:10px;
}

</style>
</head>

<body>

<!-- START -->
<section class="slide active" id="s1">
  <div class="card">
    <h1>Hey Bebdu 🤭</h1>
    <button class="btn" onclick="go(2)">Open 💙</button>
  </div>
</section>

<!-- CAKE -->
<section class="slide" id="s2">
  <div class="card">

    <div class="candles">
      <div class="candle"><div class="flame"></div></div>
      <div class="candle"><div class="flame"></div></div>
      <div class="candle"><div class="flame"></div></div>
      <div class="candle"><div class="flame"></div></div>
      <div class="candle"><div class="flame"></div></div>
      <div class="candle"><div class="flame"></div></div>
    </div>

    <button class="btn" onclick="blow()">BLOW 💨</button>

    <div class="msg" id="msg"></div>

  </div>
</section>

<!-- GIFTS -->
<section class="slide" id="s3">
  <h2>Gifts for you 🎁</h2>

  <div class="gifts">
    <div class="gift" onclick="openGift('letter')">💌</div>
    <div class="gift" onclick="openGift('photos')">📸</div>
    <div class="gift" onclick="openGift('music')">🎵</div>
  </div>
</section>

<!-- LETTER -->
<div class="modal" id="letter">
  <div class="box">
    <h2>My Love ❤️</h2>
    <p>You are my everything 🫂</p>
    <button onclick="closeModal('letter')">Close</button>
  </div>
</div>

<!-- PHOTOS -->
<div class="modal" id="photos">
  <div class="box photos">
    <img src="https://via.placeholder.com/300">
    <img src="https://via.placeholder.com/300">
    <button onclick="closeModal('photos')">Close</button>
  </div>
</div>

<!-- MUSIC -->
<div class="modal" id="music">
  <div class="box">
    <audio controls autoplay>
      <source src="voice.mp3">
    </audio>
    <button onclick="closeModal('music')">Close</button>
  </div>
</div>

<script>

/* NAV */
function go(n){
  document.querySelectorAll('.slide').forEach(s=>s.classList.remove('active'));
  document.getElementById('s'+n).classList.add('active');
}

/* 🎂 BLOW */
function blow(){
  const flames = document.querySelectorAll('.flame');

  flames.forEach((f,i)=>{
    setTimeout(()=>{
      f.style.animation="none";
      f.style.opacity="0";

      // smoke
      let smoke=document.createElement("div");
      smoke.className="smoke";
      f.parentElement.appendChild(smoke);

    }, i*200);
  });

  animateText();
}

/* ✨ TEXT ANIMATION */
function animateText(){
  const text="Happy Birthday My Bebduu 🤭❤️";
  const box=document.getElementById("msg");
  box.innerHTML="";

  text.split(" ").forEach((word,i)=>{
    let span=document.createElement("span");
    span.innerHTML=word+" ";
    span.style.opacity="0";
    span.style.display="inline-block";
    span.style.transform="translateY(10px)";
    span.style.transition="0.4s ease";

    box.appendChild(span);

    setTimeout(()=>{
      span.style.opacity="1";
      span.style.transform="translateY(0)";
    }, i*300);
  });

  setTimeout(()=>go(3),4000);
}

/* 🎁 GIFTS */
function openGift(type){
  document.getElementById(type).style.display="flex";
}

function closeModal(id){
  document.getElementById(id).style.display="none";
}

</script>

</body>
  </html>
