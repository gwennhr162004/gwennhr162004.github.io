<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Ronit ❤️</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  text-align: center;
  background: linear-gradient(to bottom right, #ff9a9e, #fad0c4);
  color: #333;
}

.container {
  padding: 50px 20px;
}

h1 {
  font-size: 40px;
  color: #ff3366;
}

p {
  font-size: 18px;
}

button {
  padding: 12px 25px;
  font-size: 18px;
  background: #ff3366;
  color: white;
  border: none;
  border-radius: 25px;
  cursor: pointer;
}

.hidden {
  display: none;
  margin-top: 20px;
}
</style>

</head>

<body>

<div class="container">
  <h1>Happy Birthday Ronit ❤️</h1>
  <p>You are my sunshine, my happiness, my everything 💛</p>

  <button onclick="showMessage()">Click for a surprise 🎁</button>

  <div id="surprise" class="hidden">
    <p>I love you so much Ronit 💕</p>
    <p>Thank you for making my life beautiful 🌸</p>
    <p>Forever yours 💖</p>
  </div>
</div>

<script>
function showMessage() {
  document.getElementById("surprise").style.display = "block";
}
</script>

</body>
</html>
