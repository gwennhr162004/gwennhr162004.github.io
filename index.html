<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Ronit ❤️</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  text-align: center;
  background: linear-gradient(to bottom right, #ff9a9e, #fecfef);
  color: white;
  overflow-x: hidden;
}

/* NAME ANIMATION */
h1 {
  font-size: 40px;
  animation: glow 2s infinite alternate;
}
@keyframes glow {
  from { text-shadow: 0 0 10px #ff4d6d; }
  to { text-shadow: 0 0 25px #ff99ac; }
}

button {
  padding: 12px 20px;
  border: none;
  border-radius: 25px;
  margin: 10px;
  font-size: 16px;
  cursor: pointer;
}

#yes {
  background: #ff4d6d;
  color: white;
}
#no {
  background: white;
  color: #ff4d6d;
  position: absolute;
}

/* HIDDEN */
.hidden {
  display: none;
}

/* SLIDESHOW */
.slideshow img {
  width: 200px;
  border-radius: 15px;
  margin-top: 20px;
}

/* LETTER */
#letter {
  position: fixed;
  top: 20%;
  left: 10%;
  right: 10%;
  background: white;
  color: black;
  padding: 20px;
  border-radius: 15px;
  display: none;
}

/* HEARTS */
.heart {
  position: fixed;
  bottom: -10px;
  font-size: 20px;
  animation: floatUp 6s linear infinite;
}
@keyframes floatUp {
  0% { transform: translateY(0); opacity: 1; }
  100% { transform: translateY(-100vh); opacity: 0; }
}
</style>

</head>

<body>

<h1>Hey Ronit ❤️</h1>
<p>Do you want to open your birthday surprise? 🤭</p>

<button id="yes" onclick="openSite()">Yes 💖</button>
<button id="no">No 🙈</button>

<div id="main" class="hidden">
  <h1>Happy Birthday Ronit ❤️</h1>

  <!-- COUNTDOWN -->
  <p id="countdown"></p>

  <!-- SLIDESHOW -->
  <div class="slideshow">
    <img id="slide" src="https://via.placeholder.com/200">
  </div>

  <button onclick="openLetter()">Open Love Letter 💌</button>

  <div id="letter">
    <p>I love you so much Ronit 🥺💖<br>
    You are my sunshine 🌻</p>
    <button onclick="closeLetter()">Close</button>
  </div>

  <p>Play my voice 🎤</p>
  <audio controls>
    <source src="your-voice.mp3">
  </audio>
</div>

<!-- MUSIC -->
<audio autoplay loop>
  <source src="https://www.bensound.com/bensound-music/bensound-love.mp3">
</audio>

<script>
// NO BUTTON RUN AWAY 😂
const noBtn = document.getElementById("no");
noBtn.addEventListener("mouseover", () => {
  noBtn.style.top = Math.random() * 80 + "%";
  noBtn.style.left = Math.random() * 80 + "%";
});

// OPEN SITE + HEART EXPLOSION 💥
function openSite() {
  document.getElementById("main").style.display = "block";

  for (let i = 0; i < 30; i++) {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 3000);
  }
}

// LETTER
function openLetter() {
  document.getElementById("letter").style.display = "block";
}
function closeLetter() {
  document.getElementById("letter").style.display = "none";
}

// COUNTDOWN ⏳
const countdown = document.getElementById("countdown");
const targetDate = new Date("June 1, 2026 00:00:00").getTime();

setInterval(() => {
  const now = new Date().getTime();
  const diff = targetDate - now;

  const days = Math.floor(diff / (1000 * 60 * 60 * 24));
  const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);

  countdown.innerHTML = days + " days " + hours + " hours left 💕";
}, 1000);

// SLIDESHOW 📸
const images = [
  "https://via.placeholder.com/200",
  "https://via.placeholder.com/200/ff4d6d",
  "https://via.placeholder.com/200/fecfef"
];

let i = 0;
setInterval(() => {
  i = (i + 1) % images.length;
  document.getElementById("slide").src = images[i];
}, 2000);

// FLOATING HEARTS
setInterval(() => {
  let heart = document.createElement("div");
  heart.className = "heart";
  heart.innerHTML = "💖";
  heart.style.left = Math.random() * 100 + "vw";
  document.body.appendChild(heart);

  setTimeout(() => heart.remove(), 6000);
}, 500);
</script>

</body>
</html>
