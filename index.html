<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Ronit ❤️</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  text-align: center;
  background: linear-gradient(to bottom right, #ff9a9e, #fecfef);
  overflow-x: hidden;
  color: #fff;
}

.container {
  padding: 60px 20px;
}

h1 {
  font-size: 42px;
  animation: glow 2s infinite alternate;
}

@keyframes glow {
  from { text-shadow: 0 0 10px #ff4d6d; }
  to { text-shadow: 0 0 20px #ff99ac; }
}

p {
  font-size: 18px;
}

button {
  padding: 12px 25px;
  font-size: 18px;
  background: #ff4d6d;
  color: white;
  border: none;
  border-radius: 30px;
  cursor: pointer;
  margin-top: 20px;
}

button:hover {
  background: #ff1a4d;
}

.hidden {
  display: none;
  margin-top: 20px;
  animation: fadeIn 2s;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

/* Floating hearts */
.heart {
  position: fixed;
  bottom: -10px;
  font-size: 20px;
  animation: floatUp 6s linear infinite;
}

@keyframes floatUp {
  0% { transform: translateY(0); opacity: 1; }
  100% { transform: translateY(-100vh); opacity: 0; }
}
</style>

</head>

<body>

<div class="container">
  <h1>Happy Birthday Ronit ❤️</h1>
  <p>You are my favorite person, my safe place, my everything 💕</p>

  <button onclick="showMessage()">Open your surprise 🎁</button>

  <div id="surprise" class="hidden">
    <p>I love you more than words can ever express 🥺💖</p>
    <p>Thank you for coming into my life and making it magical ✨</p>
    <p>You are my sunshine 🌻</p>
    <p>Forever yours ❤️</p>
  </div>
</div>

<!-- Music -->
<audio autoplay loop>
  <source src="https://www.bensound.com/bensound-music/bensound-love.mp3" type="audio/mpeg">
</audio>

<script>
function showMessage() {
  document.getElementById("surprise").style.display = "block";
}

// Create floating hearts
setInterval(() => {
  const heart = document.createElement("div");
  heart.className = "heart";
  heart.innerHTML = "❤️";
  heart.style.left = Math.random() * 100 + "vw";
  document.body.appendChild(heart);

  setTimeout(() => {
    heart.remove();
  }, 6000);
}, 500);
</script>

</body>
</html>
